<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Alumnos - Cambiar Contraseña</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Helvetica, 'Lucida Grande', Arial, sans-serif;
            font-size: 14px;
            line-height: 1;
            background-color: #c8d8e8;
            background-image: url("/img/new2.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Botón beneficios flotante */
        .boton-beneficios {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 158, 224, 255);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 20px 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            animation: pulse 1.2s infinite;
            transition: background-color 0.3s ease, transform 0.3s ease;
            z-index: 9999;
        }

        .boton-beneficios:hover {
            animation: none;
            transform: scale(1.05);
            background-color: rgb(78, 205, 255);
        }

        @keyframes pulse {
            0%   { transform: scale(1);   box-shadow: 0 0 0px rgba(0, 158, 224, 0.6); }
            50%  { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 158, 224, 1); }
            100% { transform: scale(1);   box-shadow: 0 0 0px rgba(0, 158, 224, 0.6); }
        }

        /* Header con logos */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 20px 0 10px 0;
            width: 100%;
        }

        .header img.logo-uc {
            height: 80px;
        }

        .header img.logo-sapientia {
            height: 45px;
            margin-top: 20px;
        }

        /* Contenedor principal del formulario */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            padding: 20px 0;
        }

        .form-card {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            padding: 10px;
        }

        /* Panel del formulario */
        .form-panel {
            background-color: rgba(255, 255, 255, 0.0);
            padding: 30px 10px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-panel input[type="text"],
        .form-panel input[type="password"] {
            width: 320px;
            height: 33px;
            padding: 0 10px;
            text-align: center;
            font-size: 13px;
            font-family: Helvetica, Arial, sans-serif;
            border: 1px solid #b5b8c8;
            border-radius: 0;
            background-color: #fff;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-panel input[type="text"]:focus,
        .form-panel input[type="password"]:focus {
            border-color: #3254a5;
            box-shadow: 0 0 3px rgba(50, 84, 165, 0.4);
        }

        .form-panel input::placeholder {
            color: #999;
        }

        .btn-primary {
            width: 320px;
            height: 33px;
            margin-top: 5px;
            background-color: #3254a5;
            color: white;
            font-size: 12px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            border: none;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0.3px;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #254080;
        }

        .btn-primary:active {
            background-color: #1a2e60;
        }

        .btn-primary:disabled {
            background-color: #7a94c7;
            cursor: not-allowed;
        }

        /* Mensaje de respuesta */
        .mensaje {
            width: 320px;
            padding: 10px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            text-align: center;
            border-radius: 2px;
            display: none;
        }

        .mensaje.exito {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .mensaje.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Panel de opciones (checkboxes) */
        .options-panel {
            display: flex;
            flex-direction: column;
            gap: 0;
            padding-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            height: 28px;
            cursor: pointer;
        }

        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border: 1px solid #7a7a7a;
            background-color: white;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            margin-right: 6px;
        }

        .checkbox-item input[type="checkbox"]:checked {
            background-color: white;
        }

        .checkbox-item input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 2px;
            top: 2px;
            width: 9px;
            height: 9px;
            background-color: #3254a5;
        }

        .checkbox-item input[type="checkbox"]:disabled {
            border-color: #bbb;
            background-color: #f0f0f0;
            cursor: not-allowed;
        }

        .checkbox-item label {
            font-family: Helvetica, 'Lucida Grande', Arial, sans-serif;
            font-weight: bold;
            color: #3254a5;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .checkbox-item.disabled label {
            color: #aaa;
            cursor: not-allowed;
        }

        /* Footer */
        .footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 0;
            gap: 12px;
        }

        .store-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .store-buttons img {
            height: 40px;
            display: block;
        }

        .btn-preinscripcion {
            width: 320px;
            height: 33px;
            background-color: #3254a5;
            color: white;
            font-size: 12px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            border: none;
            cursor: pointer;
        }

        .btn-preinscripcion:hover {
            background-color: #254080;
        }
    </style>
</head>
<body>

    <!-- Botón flotante BENEFICIOS -->
    <a href="https://www.universidadcatolica.edu.py/beneficios/" target="_blank" class="boton-beneficios">
        🎁 BENEFICIOS 🎁
    </a>

    <!-- Header con logos -->
    <div class="header">
        <img class="logo-uc"
             src="/img/logo-uc.png"
             onerror="this.style.display='none'"
             alt="Logo UC">
        <img class="logo-sapientia"
             src="/img/logo-sapientia2.png"
             onerror="this.style.display='none'"
             alt="Sapientia">
    </div>

    <!-- Contenido principal -->
    <div class="main-content">
        <div class="form-card">

            <!-- Formulario Cambiar Contraseña -->
            <form class="form-panel" id="formCambio">
                <input type="text"     id="cedula"            placeholder="Cédula">
                <input type="password" id="contrasena_actual" placeholder="Contraseña Actual">
                <input type="password" id="contrasena_nueva"  placeholder="Nueva Contraseña">
                <input type="password" id="confirmacion"      placeholder="Confirmar Contraseña">
                <button type="submit" class="btn-primary" id="btnEnviar">Cambiar Contraseña</button>
                <div class="mensaje" id="mensaje"></div>
            </form>

        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="store-buttons">
            <a href="https://itunes.apple.com/py/app/sapientia-alumnos-uca/id1004844441">
                <img src="/img/disp-store.png"
                     onerror="this.style.display='none'" alt="App Store">
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.enterprise.sapientia_movil">
                <img src="/img/disp-google.png"
                     onerror="this.style.display='none'" alt="Google Play">
            </a>
        </div>
        <button class="btn-preinscripcion"
                onclick="window.location='https://www.universidadcatolica.edu.py/carreras-de-grado'">
            Preinscripción Carreras de Grado
        </button>
    </div>

    <script>
        document.getElementById('formCambio').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('btnEnviar');
            const mensaje = document.getElementById('mensaje');

            btn.disabled = true;
            btn.textContent = 'Enviando...';
            mensaje.style.display = 'none';
            mensaje.className = 'mensaje';

            const payload = {
                cedula:            document.getElementById('cedula').value,
                contrasena_actual: document.getElementById('contrasena_actual').value,
                contrasena_nueva:  document.getElementById('contrasena_nueva').value,
                confirmacion:      document.getElementById('confirmacion').value,
            };

            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                const data = await res.json();

                mensaje.textContent = data.mensaje;
                mensaje.classList.add(data.ok ? 'exito' : 'error');
                mensaje.style.display = 'block';

                if (data.ok) {
                    document.getElementById('formCambio').reset();
                }
            } catch {
                mensaje.textContent = 'Error de conexión. Intente nuevamente.';
                mensaje.classList.add('error');
                mensaje.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Cambiar Contraseña';
            }
        });
    </script>

</body>
</html>
